<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltsPro - Sistema Profesional</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f0f0f;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

h1,h2{
text-align:center;
}

input,button{
padding:10px;
margin:5px 0;
width:100%;
border:none;
border-radius:6px;
}

input{
background:#1f1f1f;
color:white;
}

button{
cursor:pointer;
font-weight:bold;
}

.btn-primary{background:#f7b500;color:black;}
.btn-success{background:#00c853;color:white;}
.btn-danger{background:#d50000;color:white;}
.btn-blue{background:#2979ff;color:white;}

.card{
background:#1a1a1a;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.hidden{display:none;}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
text-align:left;
}

/* Barra superior */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

/* Título grande protagonista */
.logo{
font-size:32px;
font-weight:bold;
}

/* Botón cerrar sesión más pequeño */
.btn-danger{
width:auto;
padding:8px 15px;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginScreen">
<h1 style="font-size:40px;">⚡ VoltsPro</h1>
<h2>Login Profesional</h2>
<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">
<button class="btn-primary" onclick="login()">Ingresar</button>
<button class="btn-blue" onclick="demo()">Modo Demo</button>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">

<div class="topbar">
  <div class="logo">⚡ VoltsPro</div>
  <button class="btn-danger" onclick="logout()">Cerrar Sesión</button>
</div>

<h2 style="margin-bottom:20px;">Panel Profesional</h2>

<div class="card">
<h2>Crear Presupuesto</h2>
<input type="text" id="cliente" placeholder="Nombre del Cliente">
<input type="text" id="descripcion" placeholder="Descripción del Trabajo">
<input type="number" id="monto" placeholder="Monto en pesos">
<button class="btn-success" onclick="guardar()">Guardar Presupuesto</button>
</div>

<div class="card">
<h2>Historial</h2>
<table>
<thead>
<tr>
<th>Fecha</th>
<th>Cliente</th>
<th>Trabajo</th>
<th>Monto</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

</div>

</div>

<script>
let modoDemo=false;

function login(){
let user=document.getElementById("usuario").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="1234"){
document.getElementById("loginScreen").classList.add("hidden");
document.getElementById("panel").classList.remove("hidden");
cargar();
}else{
alert("Usuario o contraseña incorrectos");
}
}

function demo(){
modoDemo=true;
document.getElementById("loginScreen").classList.add("hidden");
document.getElementById("panel").classList.remove("hidden");
cargarDemo();
}

function logout(){
location.reload();
}

function guardar(){
if(modoDemo){
alert("Modo demo activo. No se guardan datos.");
return;
}

let cliente=document.getElementById("cliente").value;
let descripcion=document.getElementById("descripcion").value;
let monto=document.getElementById("monto").value;

if(!cliente||!descripcion||!monto){
alert("Completar todos los campos");
return;
}

let fecha=new Date().toLocaleDateString();

let presupuesto={fecha,cliente,descripcion,monto};

let datos=JSON.parse(localStorage.getItem("presupuestos"))||[];
datos.push(presupuesto);
localStorage.setItem("presupuestos",JSON.stringify(datos));

cargar();

document.getElementById("cliente").value="";
document.getElementById("descripcion").value="";
document.getElementById("monto").value="";
}

function cargar(){
let tabla=document.getElementById("tabla");
tabla.innerHTML="";
let datos=JSON.parse(localStorage.getItem("presupuestos"))||[];

datos.forEach((p,i)=>{
tabla.innerHTML+=`
<tr>
<td>${p.fecha}</td>
<td>${p.cliente}</td>
<td>${p.descripcion}</td>
<td>$${p.monto}</td>
<td>
<button onclick="imprimir(${i})">PDF</button>
<button onclick="eliminar(${i})">Eliminar</button>
</td>
</tr>
`;
});
}

function cargarDemo(){
let tabla=document.getElementById("tabla");
tabla.innerHTML=`
<tr>
<td>01/01/2026</td>
<td>Juan Pérez</td>
<td>Instalación tablero</td>
<td>$8500</td>
<td><button onclick="alert('Demo')">PDF</button></td>
</tr>
`;
}

function eliminar(i){
let datos=JSON.parse(localStorage.getItem("presupuestos"))||[];
datos.splice(i,1);
localStorage.setItem("presupuestos",JSON.stringify(datos));
cargar();
}

function imprimir(i){
let datos=JSON.parse(localStorage.getItem("presupuestos"))||[];
let p=datos[i];

let ventana=window.open("","_blank");
ventana.document.write(`
<h1>VoltsPro - Presupuesto</h1>
<p><strong>Fecha:</strong> ${p.fecha}</p>
<p><strong>Cliente:</strong> ${p.cliente}</p>
<p><strong>Trabajo:</strong> ${p.descripcion}</p>
<p><strong>Monto:</strong> $${p.monto}</p>
<hr>
<p>Generado con VoltsPro</p>
`);
ventana.print();
}
</script>

</body>
</html>
