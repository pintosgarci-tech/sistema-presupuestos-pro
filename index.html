<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltsPro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #0d0d0d;
}

/* HERO FULL PANTALLA */
.hero {
  height: 100vh;
  background: url("portada.png.png") center center / cover no-repeat;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

/* Oscurece un poco para que el texto se lea mejor */
.overlay {
  background: rgba(0,0,0,0.6);
  padding: 40px;
  border-radius: 12px;
}

h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

p {
  font-size: 20px;
  margin-bottom: 30px;
}

button {
  padding: 15px 30px;
  margin: 10px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.btn-demo {
  background-color: #f7b500;
  color: black;
}

.btn-demo:hover {
  background-color: #ffd447;
}

.btn-comprar {
  background-color: #00c853;
  color: white;
}

.btn-comprar:hover {
  background-color: #00e676;
}

@media (max-width: 768px) {
  h1 {
    font-size: 32px;
  }

  p {
    font-size: 16px;
  }
}
</style>

</head>
<body>

<section class="hero">
  <div class="overlay">
    <h1>VoltsPro</h1>
    <p>La herramienta profesional para electricistas</p>
    <button class="btn-demo">Probar Demo</button>
    <button class="btn-comprar">Comprar Ahora</button>
  </div>
</section>

</body>
</html>
